<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Photo Mapper Studio - Direct Publish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.pannellum.org/2.5/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.pannellum.org/2.5/pannellum.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        #panorama { width: 100%; height: 400px; border-radius: 0.75rem; background: #1a1a1a; }
        #map { height: 400px; border-radius: 0.75rem; z-index: 1; }
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .btn-google { background: linear-gradient(to right, #4285F4, #34A853, #FBBC05, #EA4335); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 mb-8">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="text-2xl font-bold text-blue-600 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/><path d="M12 2v20"/></svg>
                360° Direct Publisher
            </h1>
            <div id="user-info" class="flex items-center gap-3">
                <button id="authBtn" class="bg-white border border-gray-300 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 flex items-center gap-2 shadow-sm transition-all">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" class="w-4 h-4" alt="Google">
                    <span id="authBtnText">เชื่อมต่อบัญชี Google</span>
                </button>
                <button id="logoutBtn" class="hidden text-xs text-red-500 hover:underline">ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <!-- Step 1: Upload -->
                <div class="bg-white p-6 rounded-2xl custom-shadow">
                    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2 text-gray-800">
                        <span class="bg-blue-600 text-white w-7 h-7 flex items-center justify-center rounded-full text-sm font-bold">1</span>
                        <span>เลือกภาพ 360°</span>
                    </h2>
                    <div id="upload-container" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-blue-400 transition-colors mb-4 bg-gray-50">
                        <input type="file" id="photoInput" accept="image/jpeg, image/jpg" class="hidden">
                        <label for="photoInput" class="cursor-pointer block">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2-2v12a2 2 0 002 2z" />
                            </svg>
                            <span class="text-blue-600 font-medium text-lg text-center block">เลือกไฟล์ภาพ JPEG สำหรับ Google Maps</span>
                        </label>
                    </div>
                    <div id="panorama" class="hidden shadow-inner overflow-hidden rounded-xl border border-gray-200"></div>
                    <div id="viewer-placeholder" class="bg-gray-100 flex items-center justify-center rounded-xl h-[400px] text-gray-400 italic">รอการโหลดภาพ...</div>
                </div>

                <!-- Step 2: Location -->
                <div class="bg-white p-6 rounded-2xl custom-shadow">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                        <h2 class="text-xl font-semibold flex items-center gap-2 text-gray-800">
                            <span class="bg-blue-600 text-white w-7 h-7 flex items-center justify-center rounded-full text-sm font-bold">2</span>
                            <span>ระบุตำแหน่ง</span>
                        </h2>
                        <div class="flex w-full md:w-auto gap-2">
                            <input type="text" id="dmsInput" placeholder="9°04'20.1&quot;N 99°22'22.4&quot;E" class="flex-grow md:w-80 px-4 py-2 text-sm border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            <button id="applyDmsBtn" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-700 active:scale-95 transition-all">ค้นหา</button>
                        </div>
                    </div>
                    <div id="map"></div>
                    <div class="mt-4 bg-slate-800 p-4 rounded-xl flex flex-col md:flex-row justify-between items-center gap-3">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                            <p id="coords-display" class="text-sm font-mono text-green-400 font-bold tracking-widest uppercase text-center">คลิกบนแผนที่เพื่อเลือกจุด</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <!-- Step 3: Publish & Debugging -->
                <div class="bg-white p-6 rounded-2xl custom-shadow border-t-8 border-green-500 sticky top-8">
                    <h2 class="text-xl font-bold mb-6 text-gray-800 flex items-center gap-2 uppercase">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        Publish to Maps
                    </h2>
                    
                    <button id="directPublishBtn" disabled class="w-full bg-gray-200 text-gray-400 font-bold py-5 rounded-2xl transition-all flex flex-col items-center justify-center gap-1 shadow-lg cursor-not-allowed">
                        <span class="text-lg">บันทึกลง Google Maps ทันที</span>
                        <span id="publishStatus" class="text-[10px] font-normal uppercase tracking-widest">โปรดเตรียมข้อมูลให้ครบ</span>
                    </button>

                    <div id="progress-container" class="mt-6 hidden">
                        <div class="w-full bg-gray-100 rounded-full h-2 mb-2 overflow-hidden">
                            <div id="progress-bar" class="bg-green-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                        <p id="progress-text" class="text-[10px] text-gray-500 uppercase text-center font-bold">กำลังเริ่มต้น...</p>
                    </div>

                    <!-- Debugging & Redirect URI Solution -->
                    <div class="mt-8 border-t border-gray-100 pt-6 space-y-6">
                        <div>
                            <h3 class="text-xs font-bold text-blue-500 uppercase tracking-widest mb-3">การแก้ปัญหา Redirect URI</h3>
                            <div class="text-[10px] text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-200">
                                <p class="mb-2">คัดลอก URL ด้านล่างไปใส่ใน <strong>Authorized JavaScript origins</strong> ของ Google Console:</p>
                                <code id="originUrl" class="block bg-white p-2 border border-slate-300 rounded font-mono break-all text-blue-600 mb-2"></code>
                                <button onclick="copyOrigin()" class="text-blue-500 font-bold hover:underline">คลิกเพื่อคัดลอก URL</button>
                            </div>
                        </div>

                        <div id="error-log-container" class="hidden">
                            <h3 class="text-xs font-bold text-red-500 uppercase tracking-widest mb-3">รายละเอียดข้อผิดพลาด (API Log)</h3>
                            <div id="error-log" class="text-[10px] bg-red-50 text-red-700 p-3 rounded-lg border border-red-100 font-mono break-words leading-relaxed"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl opacity-0 pointer-events-none transition-all duration-300 z-[1000] shadow-2xl border border-slate-700 font-medium text-sm"></div>

    <script>
        const CLIENT_ID = '772520947338-p56b737mr3a2gqsjkcedl90c6t55gmij.apps.googleusercontent.com';
        let accessToken = null;
        let tokenClient = null;
        let viewer = null;
        let map = null;
        let marker = null;
        let selectedFile = null;

        // Origin Copy Helper
        document.getElementById('originUrl').innerText = window.location.origin;
        function copyOrigin() {
            const text = window.location.origin;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("คัดลอก URL แล้ว");
        }

        function initMap() {
            map = L.map('map').setView([13.7563, 100.5018], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on('click', (e) => updateMarker(e.latlng.lat, e.latlng.lng));
        }

        function updateMarker(lat, lng, panTo = false) {
            const coords = [lat, lng];
            if (marker) marker.setLatLng(coords);
            else {
                marker = L.marker(coords, {draggable: true}).addTo(map);
                marker.on('dragend', (e) => updateMarker(e.target.getLatLng().lat, e.target.getLatLng().lng));
            }
            if (panTo) map.setView(coords, 16);
            document.getElementById('coords-display').innerText = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            checkReadyToPublish();
        }

        // ฟังก์ชันแปลง DMS เป็น Decimal (ปรับปรุงใหม่ให้ทนทานต่ออักขระพิเศษ)
        function parseDMS(input) {
            if (!input) return null;
            
            // Regex นี้รองรับ องศา, ลิปดา, ฟิลิปดา หลากหลายรูปแบบ
            const dmsRegex = /(\d+)\s*[°o]?\s*(\d+)\s*['′]?\s*([\d.]+)\s*["″]?\s*([NSEW])/gi;
            
            let matches = [];
            let match;
            while ((match = dmsRegex.exec(input)) !== null) {
                let deg = parseFloat(match[1]);
                let min = parseFloat(match[2]);
                let sec = parseFloat(match[3]);
                let dir = match[4].toUpperCase();
                
                let dd = deg + min/60 + sec/3600;
                if (dir === 'S' || dir === 'W') dd = dd * -1;
                matches.push(dd);
            }
            
            // ต้องได้ทั้ง Latitude และ Longitude (2 ค่า)
            if (matches.length >= 2) {
                return { lat: matches[0], lng: matches[1] };
            }
            return null;
        }

        document.getElementById('applyDmsBtn').addEventListener('click', () => {
            const input = document.getElementById('dmsInput').value;
            const result = parseDMS(input);
            if (result) {
                updateMarker(result.lat, result.lng, true);
                showToast("พบตำแหน่งแล้ว");
            } else {
                showToast("ไม่พบพิกัดในรูปแบบที่ถูกต้อง");
            }
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function logError(title, detail) {
            const container = document.getElementById('error-log-container');
            const log = document.getElementById('error-log');
            container.classList.remove('hidden');
            log.innerHTML = `<strong>${title}:</strong><br>${JSON.stringify(detail, null, 2)}`;
        }

        document.getElementById('authBtn').addEventListener('click', () => {
            if (!tokenClient) {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/streetviewpublish',
                    callback: (res) => {
                        if (res.error) {
                            logError("Login Error", res);
                            showToast("เข้าสู่ระบบไม่สำเร็จ");
                            return;
                        }
                        accessToken = res.access_token;
                        document.getElementById('authBtnText').innerText = "✅ เชื่อมต่อแล้ว";
                        document.getElementById('logoutBtn').classList.remove('hidden');
                        checkReadyToPublish();
                        showToast("เชื่อมต่อ Google แล้ว");
                    },
                });
            }
            tokenClient.requestAccessToken();
        });

        document.getElementById('photoInput').addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const r = new FileReader();
                r.onload = (ev) => {
                    document.getElementById('panorama').classList.remove('hidden');
                    document.getElementById('viewer-placeholder').classList.add('hidden');
                    document.getElementById('upload-container').classList.add('hidden');
                    if (viewer) viewer.destroy();
                    viewer = pannellum.viewer('panorama', { "type": "equirectangular", "panorama": ev.target.result, "autoLoad": true });
                    checkReadyToPublish();
                };
                r.readAsDataURL(selectedFile);
            }
        });

        function checkReadyToPublish() {
            const btn = document.getElementById('directPublishBtn');
            if (accessToken && selectedFile && marker) {
                btn.disabled = false;
                btn.classList.remove('bg-gray-200', 'text-gray-400', 'cursor-not-allowed');
                btn.classList.add('btn-google', 'text-white');
                document.getElementById('publishStatus').innerText = "พร้อมอัปโหลด";
            }
        }

        document.getElementById('directPublishBtn').addEventListener('click', async () => {
            const btn = document.getElementById('directPublishBtn');
            const pBar = document.getElementById('progress-bar');
            const pText = document.getElementById('progress-text');
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('error-log-container').classList.add('hidden');
            btn.disabled = true;

            try {
                pText.innerText = "กำลังขอสิทธิ์อัปโหลด..."; pBar.style.width = "20%";
                const uploadRes = await fetch('https://streetviewpublish.googleapis.com/v1/photo:startUpload', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                if (!uploadRes.ok) throw await uploadRes.json();
                const { uploadUrl } = await uploadRes.json();

                pText.innerText = "กำลังส่งไฟล์ภาพ (โปรดรอ)..."; pBar.style.width = "50%";
                const binaryRes = await fetch(uploadUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'image/jpeg' },
                    body: selectedFile
                });
                if (!binaryRes.ok) throw { step: 'Upload Binary', status: binaryRes.status };

                pText.innerText = "กำลังสร้างจุดบน Google Maps..."; pBar.style.width = "80%";
                const latlng = marker.getLatLng();
                const metadata = {
                    uploadReference: { uploadUrl },
                    pose: { latLngPair: { latitude: latlng.lat, longitude: latlng.lng } }
                };

                const createRes = await fetch('https://streetviewpublish.googleapis.com/v1/photo', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(metadata)
                });

                if (createRes.ok) {
                    pBar.style.width = "100%";
                    pText.innerText = "บันทึกสำเร็จ!";
                    showToast("สำเร็จ! ภาพจะแสดงบนแผนที่ใน 24-72 ชม.");
                } else {
                    throw await createRes.json();
                }

            } catch (err) {
                console.error(err);
                logError("Publish Error", err);
                pText.innerText = "เกิดข้อผิดพลาด!";
                showToast("บันทึกไม่สำเร็จ ดูรายละเอียดด้านล่าง");
                btn.disabled = false;
            }
        });

        window.onload = initMap;
    </script>
</body>
</html>
